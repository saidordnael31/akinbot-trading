name: CI

on:
  push:
    branches:
      - main
      - recovery/akin-trading-v1
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate deployment registry
        run: pnpm validate:deployments

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
